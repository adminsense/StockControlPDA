<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Move stock</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222d;
      --border: #2d3a4a;
      --text: #e8eef5;
      --muted: #8b9aab;
      --accent: #3b82f6;
      --in: #1b6b3a;
      --out: #8b1a1a;
      --warn: #ca8a04;
      --ok: #22c55e;
      --radius: 10px;
      --font: system-ui, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 16px;
    }
    .shell {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0;
      color: var(--text);
    }
    label.lbl {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 12px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1218;
      color: var(--text);
      font-size: 15px;
    }
    select:focus, input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 0;
    }
    .field-block { margin-bottom: 12px; }
    .field-block:last-child { margin-bottom: 0; }
    .product-line {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1218;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
      color: var(--muted);
    }
    .product-line.set { color: var(--text); }
    .product-line .sku {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.88em;
      color: #93c5fd;
    }
    .summary {
      display: grid;
      gap: 8px;
    }
    .summary dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      font-size: 14px;
    }
    .summary dt { color: var(--muted); font-weight: 500; }
    .summary dd { margin: 0; font-weight: 600; }
    .bar-wrap {
      margin-top: 10px;
      height: 6px;
      background: #0d1218;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--ok));
      width: 45%;
      transition: width 0.2s;
    }
    .status-pill {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-ok { background: #14532d; color: #86efac; }
    .status-low { background: #713f12; color: #fcd34d; }
    .status-high { background: #7f1d1d; color: #fecaca; }
    .qty-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 0;
    }
    .qty-row button {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #243044;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }
    .qty-row .num {
      font-size: 28px;
      font-weight: 700;
      min-width: 48px;
      text-align: center;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-out {
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      background: var(--out);
    }
    .btn-in {
      background: var(--in);
      color: #fff;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-ghost {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .secondary-actions button {
      width: 100%;
    }
    .btn-sync {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: #1e3a5f;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #1e293b;
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      max-width: 90vw;
      transition: transform 0.25s ease;
      z-index: 10;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Move stock</h1>

    <div class="card">
      <h2>Move stock</h2>

      <div class="field-block">
        <label class="lbl" for="scan">Scan product code</label>
        <input id="scan" type="text" value="8712345678901" placeholder="Scan or type product code" autocomplete="off" />
        <div class="product-line set" id="productLine">
          <span class="sku">FAST-M6</span> — Fasteners box M6
        </div>
      </div>

      <div class="field-block">
        <label class="lbl" for="loc">Stock location</label>
        <select id="loc" aria-label="Stock location"></select>
      </div>
    </div>

    <div class="card" id="contextCard">
      <h2>Summary</h2>
      <div class="summary">
        <dl>
          <dt>Product</dt><dd id="sItem">Fasteners box M6 (FAST-M6)</dd>
          <dt>Location</dt><dd id="sLoc">WH01 · A01-01 — Aisle A01 bin 01</dd>
          <dt>On hand</dt><dd id="sOh">24</dd>
          <dt>Min / Max</dt><dd id="sMm">5 / 80</dd>
        </dl>
        <div class="bar-wrap" aria-hidden="true"><div class="bar" id="mmBar" style="width:25%"></div></div>
        <span class="status-pill status-ok" id="sStatus">Within range</span>
      </div>
    </div>

    <div class="card" id="moveCard">
      <h2>Quantity</h2>
      <div class="qty-row">
        <button type="button" id="qMinus" aria-label="Decrease quantity">−</button>
        <span class="num" id="qty" aria-live="polite">1</span>
        <button type="button" id="qPlus" aria-label="Increase quantity">+</button>
      </div>
      <div class="actions">
        <button type="button" class="btn-out" id="btnOut">Subtract (−)</button>
        <button type="button" class="btn-in" id="btnIn">Add (+)</button>
      </div>
      <div class="secondary-actions">
        <button type="button" class="btn-sync" id="btnSync">Sync</button>
        <button type="button" class="btn-ghost" id="btnReset">Reset flow</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const locations = [
      { id: "L1", wh: "WH01", code: "A01-01", name: "Aisle A01 bin 01" },
      { id: "L2", wh: "WH01", code: "A01-03-R2", name: "Aisle A01 rack 2" },
      { id: "L3", wh: "WH02", code: "B12-RACK2", name: "B12 rack 2" },
    ];
    const items = [
      { id: "I1", sku: "FAST-M6", name: "Fasteners box M6", bc: "8712345678901", min: 5, max: 80, balances: { L1: 24, L2: 1, L3: 0 } },
      { id: "I2", sku: "BOLT-8MM", name: "Bolt 8mm pack", bc: "2001234567893", min: 10, max: 120, balances: { L1: 3, L2: 0, L3: 8 } },
      { id: "I3", sku: "TAPE-48", name: "Tape 48mm", bc: "5901234123457", min: 2, max: 40, balances: { L1: 42, L2: 12, L3: 5 } },
    ];

    const el = (id) => document.getElementById(id);
    const locSel = el("loc");
    const scan = el("scan");
    const productLine = el("productLine");
    const qtyEl = el("qty");
    const toast = el("toast");
    let qty = 1;
    let product = items[0];

    function fillLocations() {
      locSel.innerHTML = locations.map(l =>
        `<option value="${l.id}">${l.wh} · ${l.code} — ${l.name}</option>`
      ).join("");
    }

    function onHand() {
      if (!product || !locSel.value) return null;
      return product.balances[locSel.value] ?? 0;
    }

    function currentLocation() {
      return locations.find(l => l.id === locSel.value);
    }

    function updateSummary() {
      const l = currentLocation();
      el("sItem").textContent = product ? `${product.name} (${product.sku})` : "—";
      el("sLoc").textContent = l ? `${l.wh} · ${l.code} — ${l.name}` : "—";

      const oh = onHand();
      el("sOh").textContent = oh === null ? "—" : String(oh);
      el("sMm").textContent = product ? `${product.min} / ${product.max}` : "—";

      const pill = el("sStatus");
      pill.className = "status-pill ";
      if (!product || oh === null) {
        pill.textContent = "—";
        pill.className += "status-ok";
        el("mmBar").style.width = "0%";
        return;
      }
      if (oh < product.min) {
        pill.textContent = "Below min";
        pill.className += "status-low";
      } else if (oh > product.max) {
        pill.textContent = "Above max";
        pill.className += "status-high";
      } else {
        pill.textContent = "Within range";
        pill.className += "status-ok";
      }
      const span = Math.max(1, product.max - product.min);
      const pos = Math.min(100, Math.max(0, ((oh - product.min) / span) * 100));
      el("mmBar").style.width = pos + "%";
    }

    function showProductLine() {
      if (!product) {
        productLine.textContent = "No product scanned";
        productLine.className = "product-line";
        return;
      }
      productLine.className = "product-line set";
      productLine.innerHTML = `<span class="sku">${product.sku}</span> — ${product.name}`;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function tryResolveScan(raw) {
      const v = raw.trim();
      if (!v) return;
      const itemHit = items.find(i =>
        i.bc === v || i.sku.toLowerCase() === v.toLowerCase()
      );
      if (itemHit) {
        product = itemHit;
        showProductLine();
        updateSummary();
        return;
      }
      showToast("Unknown product code");
    }

    fillLocations();
    locSel.value = "L1";
    showProductLine();
    updateSummary();

    locSel.addEventListener("change", updateSummary);

    scan.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        tryResolveScan(scan.value);
        scan.select();
      }
    });

    el("qMinus").addEventListener("click", () => { qty = Math.max(1, qty - 1); qtyEl.textContent = String(qty); });
    el("qPlus").addEventListener("click", () => { qty = Math.min(9999, qty + 1); qtyEl.textContent = String(qty); });

    el("btnIn").addEventListener("click", () => {
      if (!product) { showToast("Scan a product first."); return; }
      const oh = onHand();
      if (oh === null) return;
      product.balances[locSel.value] = oh + qty;
      showToast(`Add +${qty} · on hand ${product.balances[locSel.value]}`);
      qty = 1;
      qtyEl.textContent = "1";
      updateSummary();
    });
    el("btnOut").addEventListener("click", () => {
      if (!product) { showToast("Scan a product first."); return; }
      const oh = onHand();
      if (oh === null) return;
      if (oh < qty) {
        showToast("Insufficient stock for subtract.");
        return;
      }
      product.balances[locSel.value] = oh - qty;
      showToast(`Subtract −${qty} · on hand ${product.balances[locSel.value]}`);
      qty = 1;
      qtyEl.textContent = "1";
      updateSummary();
    });

    el("btnSync").addEventListener("click", () => showToast("Synced."));

    el("btnReset").addEventListener("click", () => {
      qty = 1;
      qtyEl.textContent = "1";
      scan.value = "";
      product = null;
      showProductLine();
      locSel.selectedIndex = 0;
      updateSummary();
      scan.focus();
    });
  </script>
</body>
</html>
