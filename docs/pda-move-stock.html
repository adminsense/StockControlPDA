<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Move stock</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222d;
      --border: #2d3a4a;
      --text: #e8eef5;
      --muted: #8b9aab;
      --accent: #3b82f6;
      --in: #1b6b3a;
      --out: #8b1a1a;
      --warn: #ca8a04;
      --ok: #22c55e;
      --radius: 10px;
      --font: system-ui, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 16px;
    }
    .shell {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0;
      color: var(--text);
    }
    label.lbl {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 12px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1218;
      color: var(--text);
      font-size: 15px;
    }
    select:focus, input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 0;
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .scan-row { margin-top: 12px; }
    .summary {
      display: grid;
      gap: 8px;
    }
    .summary dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      font-size: 14px;
    }
    .summary dt { color: var(--muted); font-weight: 500; }
    .summary dd { margin: 0; font-weight: 600; }
    .bar-wrap {
      margin-top: 10px;
      height: 6px;
      background: #0d1218;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--ok));
      width: 45%;
      transition: width 0.2s;
    }
    .status-pill {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-ok { background: #14532d; color: #86efac; }
    .status-low { background: #713f12; color: #fcd34d; }
    .status-high { background: #7f1d1d; color: #fecaca; }
    .qty-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 0;
    }
    .qty-row button {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #243044;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }
    .qty-row .num {
      font-size: 28px;
      font-weight: 700;
      min-width: 48px;
      text-align: center;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-out {
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      background: var(--out);
    }
    .btn-in {
      background: var(--in);
      color: #fff;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-ghost {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .secondary-actions button {
      width: 100%;
    }
    .btn-sync {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: #1e3a5f;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #1e293b;
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      max-width: 90vw;
      transition: transform 0.25s ease;
      z-index: 10;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Move stock</h1>

    <div class="card">
      <h2>Warehouse &amp; item</h2>
      <label class="lbl" for="wh">Warehouse</label>
      <select id="wh" aria-label="Warehouse"></select>
      <div class="grid2" style="margin-top:12px">
        <div>
          <label class="lbl" for="loc">Location</label>
          <select id="loc" aria-label="Location"></select>
        </div>
        <div>
          <label class="lbl" for="item">Item</label>
          <select id="item" aria-label="Item"></select>
        </div>
      </div>
      <div class="scan-row">
        <label class="lbl" for="scan">Scan or type code</label>
        <input id="scan" type="text" placeholder="Scan or type code" autocomplete="off" />
      </div>
    </div>

    <div class="card" id="contextCard">
      <h2>Summary</h2>
      <div class="summary">
        <dl>
          <dt>Warehouse</dt><dd id="sWh">—</dd>
          <dt>Location</dt><dd id="sLoc">—</dd>
          <dt>Item</dt><dd id="sItem">—</dd>
          <dt>On hand</dt><dd id="sOh">—</dd>
          <dt>Min / Max</dt><dd id="sMm">—</dd>
        </dl>
        <div class="bar-wrap" aria-hidden="true"><div class="bar" id="mmBar"></div></div>
        <span class="status-pill status-ok" id="sStatus">Within range</span>
      </div>
    </div>

    <div class="card" id="moveCard">
      <h2>Quantity</h2>
      <div class="qty-row">
        <button type="button" id="qMinus" aria-label="Decrease quantity">−</button>
        <span class="num" id="qty" aria-live="polite">1</span>
        <button type="button" id="qPlus" aria-label="Increase quantity">+</button>
      </div>
      <div class="actions">
        <button type="button" class="btn-out" id="btnOut">Outbound (−)</button>
        <button type="button" class="btn-in" id="btnIn">Inbound (+)</button>
      </div>
      <div class="secondary-actions">
        <button type="button" class="btn-sync" id="btnSync">Sync</button>
        <button type="button" class="btn-ghost" id="btnReset">Reset flow</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const warehouses = [
      { id: "W1", code: "WH-A", name: "Warehouse A" },
      { id: "W2", code: "WH-B", name: "Warehouse B" },
    ];
    const locations = [
      { id: "L1", wh: "W1", code: "LOC-A01-03", name: "Aisle A01 bin 03" },
      { id: "L2", wh: "W1", code: "LOC-A01-04", name: "Aisle A01 bin 04" },
      { id: "L3", wh: "W2", code: "LOC-B12-RACK2", name: "B12 rack 2" },
    ];
    const items = [
      { id: "I1", sku: "FAST-M6", name: "Fasteners box M6", bc: "8712345678901", min: 5, max: 80, oh: 24 },
      { id: "I2", sku: "BOLT-8MM", name: "Bolt 8mm pack", bc: "2001234567893", min: 10, max: 120, oh: 3 },
      { id: "I3", sku: "TAPE-48", name: "Tape 48mm", bc: "5901234123457", min: 2, max: 40, oh: 42 },
    ];

    const el = (id) => document.getElementById(id);
    const whSel = el("wh");
    const locSel = el("loc");
    const itemSel = el("item");
    const scan = el("scan");
    const qtyEl = el("qty");
    const toast = el("toast");
    let qty = 1;

    function fillWarehouses() {
      whSel.innerHTML = warehouses.map(w => `<option value="${w.id}">${w.code} — ${w.name}</option>`).join("");
    }
    function refreshLocations() {
      const wid = whSel.value;
      const opts = locations.filter(l => l.wh === wid);
      locSel.innerHTML = opts.map(l => `<option value="${l.id}">${l.code}</option>`).join("");
    }
    function fillItems() {
      itemSel.innerHTML = items.map(i => `<option value="${i.id}">${i.sku} — ${i.name}</option>`).join("");
    }

    function currentItem() {
      return items.find(i => i.id === itemSel.value) || items[0];
    }
    function currentLocation() {
      return locations.find(l => l.id === locSel.value);
    }
    function currentWarehouse() {
      return warehouses.find(w => w.id === whSel.value);
    }

    function updateSummary() {
      const w = currentWarehouse();
      const l = currentLocation();
      const i = currentItem();
      el("sWh").textContent = w ? `${w.code} (${w.name})` : "—";
      el("sLoc").textContent = l ? `${l.code} — ${l.name}` : "—";
      el("sItem").textContent = i ? `${i.name} (${i.sku})` : "—";
      el("sOh").textContent = i ? String(i.oh) : "—";
      el("sMm").textContent = i ? `${i.min} / ${i.max}` : "—";

      const pill = el("sStatus");
      pill.className = "status-pill ";
      if (!i) {
        pill.textContent = "—";
        pill.className += "status-ok";
        el("mmBar").style.width = "0%";
        return;
      }
      if (i.oh < i.min) {
        pill.textContent = "Below min";
        pill.className += "status-low";
      } else if (i.oh > i.max) {
        pill.textContent = "Above max";
        pill.className += "status-high";
      } else {
        pill.textContent = "Within range";
        pill.className += "status-ok";
      }
      const span = Math.max(1, i.max - i.min);
      const pos = Math.min(100, Math.max(0, ((i.oh - i.min) / span) * 100));
      el("mmBar").style.width = pos + "%";
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function tryResolveScan(raw) {
      const v = raw.trim();
      if (!v) return;
      const locHit = locations.find(l => l.code.toLowerCase() === v.toLowerCase());
      if (locHit) {
        whSel.value = locHit.wh;
        refreshLocations();
        locSel.value = locHit.id;
        updateSummary();
        return;
      }
      const itemHit = items.find(i => i.bc === v || i.sku.toLowerCase() === v.toLowerCase());
      if (itemHit) {
        itemSel.value = itemHit.id;
        updateSummary();
        scan.focus();
        return;
      }
      showToast("Unknown code");
    }

    fillWarehouses();
    refreshLocations();
    fillItems();
    updateSummary();

    whSel.addEventListener("change", () => { refreshLocations(); updateSummary(); });
    locSel.addEventListener("change", updateSummary);
    itemSel.addEventListener("change", updateSummary);

    scan.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        tryResolveScan(scan.value);
        scan.select();
      }
    });

    el("qMinus").addEventListener("click", () => { qty = Math.max(1, qty - 1); qtyEl.textContent = String(qty); });
    el("qPlus").addEventListener("click", () => { qty = Math.min(9999, qty + 1); qtyEl.textContent = String(qty); });

    el("btnIn").addEventListener("click", () => {
      const i = currentItem();
      i.oh += qty;
      showToast(`Inbound +${qty} · on hand ${i.oh}`);
      qty = 1;
      qtyEl.textContent = "1";
      updateSummary();
    });
    el("btnOut").addEventListener("click", () => {
      const i = currentItem();
      if (i.oh < qty) {
        showToast("Insufficient stock for this outbound.");
        return;
      }
      i.oh -= qty;
      showToast(`Outbound −${qty} · on hand ${i.oh}`);
      qty = 1;
      qtyEl.textContent = "1";
      updateSummary();
    });

    el("btnSync").addEventListener("click", () => {
      showToast("Synced.");
    });

    el("btnReset").addEventListener("click", () => {
      qty = 1;
      qtyEl.textContent = "1";
      scan.value = "";
      whSel.selectedIndex = 0;
      refreshLocations();
      itemSel.selectedIndex = 0;
      updateSummary();
    });
  </script>
</body>
</html>
